name: Deploy Docs Reusable Workflow

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verify branch is relevant (very defensive)
        run: |
          allowed=("main" "release-v0.1.0" "release-v0.2.0" "release-v0.3.0" "release-v1.0.0")
          branch="${{ inputs.branch }}"
          if [[ ! " ${allowed[@]} " =~ " ${branch} " ]]; then
            echo "❌ ERROR: Branch '${branch}' is not in the list of allowed branches."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Checkout the pushed release branch (now that we know it's relevant)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
    
      - name: Set up Python and install requirements using requirements.txt from the branch
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure gh-pages branch exists (create if needed)
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null; then
            echo "Initializing gh-pages with dummy content..."
            mike deploy --push --update-aliases --allow-empty dummy
            mike delete --push dummy
          else
            echo "gh-pages branch already exists. No initialization needed."
          fi
          
      - name: Deploy with mike according to branch rules (CHANGE THIS EACH TIME YOU DO A VERSION BUMP)
        run: |
          set -e
    
          branch="${GITHUB_REF_NAME}"
          echo "Deploying docs for branch: $branch"
    
          if [[ "$branch" == "main" ]]; then
            mike deploy -t "next" --update-aliases --push next head
    
          elif [[ "$branch" == "release-v1.0.0" ]]; then
            mike deploy -t "v1.0.0 (latest)" --update-aliases --push v1.0.0 latest stable
            mike set-default --push latest
    
          elif [[ "$branch" == release-v* ]]; then
            version="${branch#release-}"
            mike deploy -t "$version" --update-aliases --push "$version"
    
          else
            echo "No deploy rule for branch: $branch"
            exit 0
          fi

      - name: Final reminder
        run: |
          echo "⚠️ If you've deleted and rebuilt the gh-pages branch:"
          echo "➡️  Re-enable GitHub Pages publishing under repo → Settings → Pages"
          echo
          echo "⚠️ If no default version is set in versions.json:"
          echo "➡️  The site will 404 at its root URL. Set one using:"
          echo "    mike set-default <version> && git push origin gh-pages"
